<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #14b8a6;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f1f5f9;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .joke-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 3rem 2rem;
            margin-bottom: 2rem;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .joke-card:hover {
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
            transform: translateY(-5px);
        }

        .joke-content {
            text-align: center;
            width: 100%;
        }

        .joke-setup {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            color: var(--text);
        }

        .joke-delivery {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-style: italic;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
        }

        .joke-delivery.hidden {
            opacity: 0.3;
            color: var(--text-muted);
        }

        .joke-type {
            display: inline-block;
            background: rgba(20, 184, 166, 0.2);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .single-joke {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.6;
            color: var(--text);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1.1rem;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: rgba(99, 102, 241, 0.3);
            transform: translateY(-3px);
        }

        .btn-secondary:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-item {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .category-selector {
            margin-bottom: 2rem;
        }

        .category-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
            display: block;
            font-weight: 600;
        }

        .category-select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(99, 102, 241, 0.1);
            border: 2px solid rgba(99, 102, 241, 0.3);
            color: var(--text);
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-select:hover,
        .category-select:focus {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.15);
            outline: none;
        }

        .category-select option {
            background: var(--dark);
            color: var(--text);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 2rem;
        }

        .share-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .share-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .share-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .joke-card {
                padding: 2rem 1.5rem;
                min-height: 150px;
            }

            .joke-setup {
                font-size: 1.1rem;
            }

            .joke-delivery {
                font-size: 1rem;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .single-joke {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .header {
                margin-bottom: 2rem;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .header p {
                font-size: 1rem;
            }

            .joke-card {
                padding: 1.5rem 1rem;
            }

            .joke-setup {
                font-size: 1rem;
            }

            .btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>😂 Joke Generator</h1>
            <p>Get random jokes to brighten your day</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="category-selector">
            <label class="category-label" for="category">Select Category</label>
            <select id="category" class="category-select">
                <option value="">Random (Any Category)</option>
                <option value="general">General</option>
                <option value="programming">Programming</option>
                <option value="knock-knock">Knock-Knock</option>
            </select>
        </div>

        <div class="joke-card" id="jokeCard">
            <div class="loading">
                <div class="spinner"></div>
                Loading a joke for you...
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="newJokeBtn" onclick="getJoke()">
                <i class="fas fa-laugh"></i> New Joke
            </button>
            <button class="btn btn-secondary" id="copyBtn" onclick="copyJoke()" style="display: none;">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Jokes Loaded</div>
                <div class="stat-value" id="jokesCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Laughs Today</div>
                <div class="stat-value" id="laughsCount">0</div>
            </div>
        </div>

        <div class="share-group" id="shareGroup" style="display: none;">
            <button class="share-btn" title="Share on Twitter" onclick="shareOnTwitter()">
                <i class="fab fa-twitter"></i>
            </button>
            <button class="share-btn" title="Share on Facebook" onclick="shareOnFacebook()">
                <i class="fab fa-facebook"></i>
            </button>
            <button class="share-btn" title="Share via WhatsApp" onclick="shareOnWhatsApp()">
                <i class="fab fa-whatsapp"></i>
            </button>
        </div>
    </div>

    <script>
        let currentJoke = null;
        let jokesLoaded = 0;
        let laughsToday = 0;

        // Load stats from localStorage
        function loadStats() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('jokeDate');
            
            if (savedDate === today) {
                jokesLoaded = parseInt(localStorage.getItem('jokesLoaded')) || 0;
                laughsToday = parseInt(localStorage.getItem('laughsToday')) || 0;
            } else {
                localStorage.setItem('jokeDate', today);
                jokesLoaded = 0;
                laughsToday = 0;
            }
            
            updateStats();
        }

        // Update stats display
        function updateStats() {
            document.getElementById('jokesCount').textContent = jokesLoaded;
            document.getElementById('laughsCount').textContent = laughsToday;
            localStorage.setItem('jokesLoaded', jokesLoaded);
            localStorage.setItem('laughsToday', laughsToday);
        }

        // Get joke from API
        async function getJoke() {
            const category = document.getElementById('category').value;
            const jokeCard = document.getElementById('jokeCard');
            const errorDiv = document.getElementById('error');
            const copyBtn = document.getElementById('copyBtn');
            const shareGroup = document.getElementById('shareGroup');

            // Show loading state
            jokeCard.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Loading a joke for you...
                </div>
            `;
            errorDiv.style.display = 'none';
            copyBtn.style.display = 'none';
            shareGroup.style.display = 'none';

            try {
                let url = 'https://official-joke-api.appspot.com/random_joke';
                
                if (category) {
                    url = `https://official-joke-api.appspot.com/jokes/${category}/random`;
                }

                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                // Handle array response (some endpoints return arrays)
                let data = await response.json();
                if (Array.isArray(data)) {
                    data = data[0];
                }

                currentJoke = data;
                displayJoke(data);
                
                jokesLoaded++;
                laughsToday++;
                updateStats();
                
                copyBtn.style.display = 'flex';
                shareGroup.style.display = 'flex';

            } catch (error) {
                console.error('Error fetching joke:', error);
                errorDiv.textContent = `❌ Oops! ${error.message}. Please try again.`;
                errorDiv.style.display = 'block';
                jokeCard.innerHTML = `
                    <div style="text-align: center; color: var(--text-muted);">
                        <i class="fas fa-frown" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                        <p>Failed to load joke. Please try again.</p>
                    </div>
                `;
            }
        }

        // Display joke in card
        function displayJoke(joke) {
            const jokeCard = document.getElementById('jokeCard');
            const jokeType = joke.type || '';

            let jokeHTML = '';
            
            if (joke.setup && joke.delivery) {
                // Two-part joke
                jokeHTML = `
                    <div class="joke-content">
                        ${jokeType ? `<div class="joke-type">${jokeType}</div>` : ''}
                        <div class="joke-setup">${escapeHtml(joke.setup)}</div>
                        <div class="joke-delivery">${escapeHtml(joke.delivery)}</div>
                    </div>
                `;
            } else {
                // Single joke
                jokeHTML = `
                    <div class="joke-content">
                        ${jokeType ? `<div class="joke-type">${jokeType}</div>` : ''}
                        <div class="single-joke">${escapeHtml(joke.joke)}</div>
                    </div>
                `;
            }

            jokeCard.innerHTML = jokeHTML;
        }

        // Copy joke to clipboard
        function copyJoke() {
            if (!currentJoke) return;

            let jokeText = '';
            if (currentJoke.setup && currentJoke.delivery) {
                jokeText = `${currentJoke.setup}\n${currentJoke.delivery}`;
            } else {
                jokeText = currentJoke.joke;
            }

            navigator.clipboard.writeText(jokeText).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        // Share functions
        function shareOnTwitter() {
            if (!currentJoke) return;
            let jokeText = currentJoke.setup ? `${currentJoke.setup} ${currentJoke.delivery}` : currentJoke.joke;
            const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(jokeText)} 😂`;
            window.open(twitterUrl, '_blank');
        }

        function shareOnFacebook() {
            const facebookUrl = `https://www.facebook.com/sharer/sharer.php?u=${window.location.href}`;
            window.open(facebookUrl, '_blank');
        }

        function shareOnWhatsApp() {
            if (!currentJoke) return;
            let jokeText = currentJoke.setup ? `${currentJoke.setup} ${currentJoke.delivery}` : currentJoke.joke;
            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(jokeText)} 😂`;
            window.open(whatsappUrl, '_blank');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            loadStats();
            getJoke();
        });

        // Refresh joke when category changes
        document.getElementById('category').addEventListener('change', getJoke);
    </script>
</body>
</html>
